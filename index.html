<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="toolbar" aria-label="Drawing controls">
            <div class="tool-group">
                <button class="tool-btn active" id="pencilButton" type="button">Pencil</button>
                <button class="tool-btn" id="eraserButton" type="button">Eraser</button>
            </div>

            <div class="tool-group">
                <label class="input-label" for="colorPicker">Color</label>
                <input type="color" id="colorPicker" value="#e6edf3">
            </div>

            <div class="tool-group slider-group">
                <label class="input-label" for="brushSize">Width <span id="brushSizeValue">6</span></label>
                <input type="range" id="brushSize" value="6" min="1" max="60">
            </div>

            <div class="tool-group tool-actions">
                <button class="tool-btn" id="undoButton" type="button">Undo</button>
                <button class="tool-btn" id="redoButton" type="button">Redo</button>
                <button class="tool-btn danger" id="clearButton" type="button">Clear</button>
            </div>
        </section>

        <section class="canvas-wrap">
            <canvas id="drawingCanvas" aria-label="Drawing canvas"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
